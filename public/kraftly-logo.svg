<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A82E8"/>
      <stop offset="100%" stop-color="#1E4EC4"/>
